<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" fill="none" role="img" aria-label="OctoNext — a fast, clean code tree sidebar for GitHub">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e14"/>
      <stop offset="0.5" stop-color="#0d1320"/>
      <stop offset="1" stop-color="#10182a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2da44e"/>
      <stop offset="0.5" stop-color="#3fb950"/>
      <stop offset="1" stop-color="#2da44e"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c9d1d9"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2da44e" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#2da44e" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#2f81f7" opacity="0.14"/>
      <animateTransform attributeName="patternTransform" type="translate" from="0 0" to="34 34" dur="7s" repeatCount="indefinite"/>
    </pattern>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.06"/>
      <animateTransform attributeName="patternTransform" type="translate" from="0 0" to="-60 0" dur="11s" repeatCount="indefinite"/>
    </pattern>
    <clipPath id="frame"><rect x="2" y="2" width="1196" height="336" rx="22"/></clipPath>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#03060c" flood-opacity="0.6"/>
    </filter>
  </defs>

  <g clip-path="url(#frame)">
    <rect x="2" y="2" width="1196" height="336" fill="url(#bg)"/>
    <rect x="2" y="2" width="1196" height="336" fill="url(#grid)"/>
    <rect x="2" y="2" width="1196" height="336" fill="url(#dots)"/>

    <ellipse cx="250" cy="170" rx="320" ry="230" fill="url(#glow)">
      <animate attributeName="rx" values="320;360;320" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="980" cy="120" rx="220" ry="180" fill="url(#glow)" opacity="0.5">
      <animate attributeName="opacity" values="0.25;0.55;0.25" dur="7s" repeatCount="indefinite"/>
    </ellipse>

    <g fill="#3fb950">
      <circle cx="430" cy="300" r="2.2" opacity="0.6"><animate attributeName="cy" values="320;-10" dur="8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.7;0" dur="8s" repeatCount="indefinite"/></circle>
      <circle cx="640" cy="300" r="1.8" opacity="0.5"><animate attributeName="cy" values="340;-10" dur="10s" begin="-3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.6;0" dur="10s" begin="-3s" repeatCount="indefinite"/></circle>
      <circle cx="820" cy="300" r="2.6" opacity="0.5"><animate attributeName="cy" values="330;-10" dur="9s" begin="-5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.55;0" dur="9s" begin="-5s" repeatCount="indefinite"/></circle>
      <circle cx="1040" cy="300" r="2" opacity="0.5" fill="#2f81f7"><animate attributeName="cy" values="350;-10" dur="12s" begin="-2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.5;0" dur="12s" begin="-2s" repeatCount="indefinite"/></circle>
      <circle cx="1130" cy="300" r="1.6" opacity="0.5"><animate attributeName="cy" values="320;-10" dur="9s" begin="-6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.6;0" dur="9s" begin="-6s" repeatCount="indefinite"/></circle>
      <circle cx="560" cy="300" r="1.6" opacity="0.5" fill="#2f81f7"><animate attributeName="cy" values="345;-10" dur="11s" begin="-7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.5;0" dur="11s" begin="-7s" repeatCount="indefinite"/></circle>
    </g>

    <rect x="2" y="2" width="1196" height="6" fill="url(#accent)"/>
    <rect x="-260" y="2" width="260" height="6" fill="url(#sheen)" opacity="0.9">
      <animate attributeName="x" values="-260;1200" dur="3.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect x="2" y="2" width="1196" height="336" rx="22" fill="none" stroke="#21303f" stroke-width="1.5"/>

  <g transform="translate(72 66)" filter="url(#soft)">
    <rect width="300" height="208" rx="16" fill="#0b1018" stroke="#26313f" stroke-width="1.5"/>
    <rect width="300" height="40" rx="16" fill="#121a26"/>
    <rect y="24" width="300" height="16" fill="#121a26"/>
    <circle cx="20" cy="20" r="6" fill="#3fb950">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <rect x="38" y="14" width="96" height="12" rx="6" fill="#c9d1d9" opacity="0.8"/>
    <circle cx="278" cy="20" r="5" fill="#2da44e"/>

    <g font-family="'JetBrains Mono','Cascadia Code',ui-monospace,monospace" font-size="13" fill="#adbac7">
      <path d="M22 64.5l5 4.5-5 4.5z" fill="#7d8590"/>
      <rect x="36" y="63" width="14" height="13" rx="3" fill="#54aeff" opacity="0.9"/>
      <text x="58" y="73">src</text>

      <path d="M44 90.5l5 4.5-5 4.5z" fill="#7d8590"/>
      <rect x="58" y="89" width="14" height="13" rx="3" fill="#3fb950" opacity="0.9"/>
      <text x="80" y="99">core</text>

      <rect x="80" y="115" width="13" height="13" rx="3" fill="#f0883e" opacity="0.95"/>
      <text x="100" y="125" fill="#e6edf3">client.ts</text>

      <rect x="60" y="135" width="220" height="22" rx="6" fill="#3fb950" opacity="0.16"/>
      <rect x="60" y="135" width="3" height="22" rx="1.5" fill="#3fb950"/>
      <rect x="80" y="139" width="13" height="13" rx="3" fill="#f0883e"/>
      <text x="100" y="149" fill="#f0f6fc">tree-builder.ts</text>

      <rect x="58" y="163" width="13" height="13" rx="3" fill="#a371f7" opacity="0.95"/>
      <text x="78" y="173">app.ts</text>

      <rect x="36" y="187" width="13" height="13" rx="3" fill="#8b949e" opacity="0.85"/>
      <text x="56" y="197">README.md</text>
    </g>
  </g>

  <g transform="translate(452 0)">
    <text x="0" y="150" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="94" font-weight="800" letter-spacing="-3">
      <tspan fill="url(#word)">Octo</tspan><tspan fill="url(#accent)">Next</tspan>
    </text>
    <rect x="3" y="170" width="120" height="5" rx="2.5" fill="url(#accent)"/>
    <text x="4" y="205" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="25" font-weight="500" fill="#adbac7">A fast, clean code tree sidebar for GitHub.</text>

    <g font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14">
      <rect x="4" y="226" width="150" height="34" rx="10" fill="#0b1018" stroke="#26313f"/>
      <circle cx="24" cy="243" r="4" fill="#3fb950"><animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/></circle>
      <text x="38" y="243" dominant-baseline="central" fill="#9fb0c0">Manifest V3</text>

      <rect x="166" y="226" width="140" height="34" rx="10" fill="#0b1018" stroke="#26313f"/>
      <circle cx="186" cy="243" r="4" fill="#54aeff"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/></circle>
      <text x="200" y="243" dominant-baseline="central" fill="#9fb0c0">TypeScript</text>

      <rect x="318" y="226" width="160" height="34" rx="10" fill="#0b1018" stroke="#26313f"/>
      <circle cx="338" cy="243" r="4" fill="#f0883e"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/></circle>
      <text x="352" y="243" dominant-baseline="central" fill="#9fb0c0">No telemetry</text>
    </g>
  </g>
</svg>
