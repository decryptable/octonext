title: "[Idea] "
labels: ["idea"]
body:
  - type: markdown
    attributes:
      value: |
        Ideas are early and unpolished by design. Once an idea firms up, it can graduate into a [feature request](https://github.com/decryptable/octonext/issues/new?template=feature_request.yml).

  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What would you like OctoNext to do?
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why it matters
      description: The workflow or pain point behind it.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - File tree
        - Pull request panel
        - Themes and appearance
        - Bookmarks
        - Downloads
        - Settings
        - Something else
