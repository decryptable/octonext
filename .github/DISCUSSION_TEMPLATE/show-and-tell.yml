title: "[Show] "
labels: ["show-and-tell"]
body:
  - type: textarea
    id: showcase
    attributes:
      label: What you built or configured
      description: Custom theme, workflow, screenshot, or setup you want to share.
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Settings, CSS, or steps so others can reproduce it.
